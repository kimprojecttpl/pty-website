    /* ============================== Hooks ============================== */
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        if (!('IntersectionObserver' in window)) { els.forEach(e=>e.classList.add('in')); return; }
        const io = new IntersectionObserver((entries)=>{
          entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
        }, { threshold: 0.12 });
        els.forEach(e=>io.observe(e));
        return ()=>io.disconnect();
      });
    }

    function useScrollSpy(ids) {
      const [active, setActive] = useState(ids[0]);
      useEffect(()=>{
        const io = new IntersectionObserver((entries)=>{
          entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); });
        }, { rootMargin:'-45% 0px -50% 0px' });
        ids.forEach(id=>{ const el=document.getElementById(id); if(el) io.observe(el); });
        return ()=>io.disconnect();
      }, []);
      return active;
    }

    /* ============================== App ============================== */
    const FONT_SCALES = [0.9, 1.0, 1.1, 1.2];

    function App() {
      const [lang, setLang]   = useState(()=> localStorage.getItem('pty-lang') || 'th');
      const [theme, setTheme] = useState(()=> localStorage.getItem('pty-theme') || 'system');
      const [fontIdx, setFontIdx] = useState(()=> { const v=parseInt(localStorage.getItem('pty-font')); return isNaN(v)?1:v; });
      const [showTop, setShowTop] = useState(false);

      const C = CONTENT[lang];
      const ids = ['about','products','customers','locations','contact'];
      const active = useScrollSpy(ids);
      useReveal();

      // lang persist + <html lang>
      useEffect(()=>{ localStorage.setItem('pty-lang', lang); document.documentElement.lang = lang; }, [lang]);

      // theme apply + persist
      useEffect(()=>{
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const apply = ()=>{
          const dark = theme==='dark' || (theme==='system' && mq.matches);
          document.documentElement.classList.toggle('dark', dark);
        };
        apply(); localStorage.setItem('pty-theme', theme);
        if(theme==='system'){ mq.addEventListener('change', apply); return ()=>mq.removeEventListener('change', apply); }
      }, [theme]);

      // font scale
      useEffect(()=>{ document.documentElement.style.fontSize = (FONT_SCALES[fontIdx]*100)+'%'; localStorage.setItem('pty-font', fontIdx); }, [fontIdx]);

      // back-to-top visibility
      useEffect(()=>{ const f=()=>setShowTop(window.scrollY>600); window.addEventListener('scroll',f,{passive:true}); return ()=>window.removeEventListener('scroll',f); },[]);

      const cycleTheme = ()=> setTheme(t=> t==='dark' ? 'light' : 'dark');

      return (
        <React.Fragment>
          <Navbar lang={lang} setLang={setLang} theme={theme} cycleTheme={cycleTheme} fontIdx={fontIdx} setFontIdx={setFontIdx} C={C} active={active} />
          <main>
            <Hero C={C} />
            <About C={C} />
            <Brands C={C} />
            <Segments C={C} />
            <Offices C={C} />
            <Contact C={C} />
          </main>
          <Footer C={C} lang={lang} setLang={setLang} />

          {/* Back to top */}
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} aria-label={C.a11y.top}
            className={"fixed bottom-5 right-5 z-40 p-3 rounded-full bg-pty-orange text-[#1a1a1a] shadow-lg shadow-pty-orange/30 ring-1 ring-pty-yellow/70 transition-all duration-300 cursor-pointer hover:bg-pty-orange-light hover:-translate-y-1 "+(showTop?"opacity-100 translate-y-0":"opacity-0 translate-y-4 pointer-events-none")}>
            <Icon name="arrowUp" className="w-5 h-5" />
          </button>
        </React.Fragment>
      );
    }

    // input styling helper class via Tailwind @apply alternative: inject once

    style.textContent = `
      .pty-input{ width:100%; border-radius:0.75rem; border:1px solid rgba(0,0,0,0.12); background:rgba(255,255,255,0.7); padding:0.7rem 0.9rem; font-size:0.95rem; color:#333; transition:border-color .2s, box-shadow .2s; }
      .dark .pty-input{ background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.15); color:#f0f0f0; }
      .pty-input:focus{ outline:none; border-color:#f39200; box-shadow:0 0 0 3px rgba(243,146,0,0.25); }
      .pty-input::placeholder{ color:#9a9a9a; }
    `;
    document.head.appendChild(style);

    const boot = document.getElementById('boot'); if(boot) boot.remove();
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
